app = "gondurasmc-web"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  DRASL_URL = "https://gondurasmc-auth.fly.dev"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
