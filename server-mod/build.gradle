plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
}

version = '1.0.0'
group = 'com.gondurasmc'
base { archivesName = 'gondurasmc-link' }

java {
    toolchain { languageVersion = JavaLanguageVersion.of(21) }
}

repositories { mavenCentral() }

neoForge {
    version = '21.1.233'
    mods {
        gondurasmc { sourceSet sourceSets.main }
    }
}

dependencies {
    // Gson предоставляется самим Minecraft в рантайме — только для компиляции.
    compileOnly 'com.google.code.gson:gson:2.11.0'
}
