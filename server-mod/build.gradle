plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
}

version = '1.0.0'
group = 'com.gondurasmc'
base { archivesName = 'gondurasmc-link' }

java {
    toolchain { languageVersion = JavaLanguageVersion.of(21) }
}

repositories { mavenCentral() }

neoForge {
    version = '21.1.233'
    mods {
        gondurasmc { sourceSet sourceSets.main }
    }
}

// Gson уже на classpath через NeoForge/Minecraft — отдельная зависимость не нужна.
